[settings]
# read the node version from .nvmrc instead of pinning it here
idiomatic_version_file_enable_tools = ["node"]

[tools]
# keep in sync with package.json's packageManager/devDependencies pins
pnpm = "11.10.0"
"npm:turbo" = "2.10.4"
"go:github.com/rhysd/actionlint/cmd/actionlint" = "1.7.12"
