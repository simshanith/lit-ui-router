# One version authority per tool — see the toolchain table in CONTRIBUTING.md.

# Monorepo task addressing (`mise run '//tools/release:pack'`): task defs live
# beside the code they run. Root trust covers every config_root below, so the
# usual `mise trust` (or mise-action's MISE_TRUSTED_CONFIG_PATHS) is enough.
monorepo_root = true

[monorepo]
# Explicit roots — mise deprecated filesystem auto-discovery. A glob only
# matches directories that actually carry a mise config.
config_roots = ["tools/*"]

[env]
# Workspace binaries win over mise tools/globals; absolute via config_root
# (repo root), so bare `turbo` etc. stay spawn-safe in any cwd or worktree.
# The cwd entry puts a workspace member's own .bin first when cd'd into it
# (isolated node_modules: member-only bins like vitest/typedoc/vitepress
# aren't at root), matching pnpm-script resolution; elsewhere it's a dead
# entry, and at the repo root a harmless duplicate of the config_root one.
_.path = ["{{cwd}}/node_modules/.bin", "{{config_root}}/node_modules/.bin"]
# Relocated taplo.toml out of root into `.config/`
# https://taplo.tamasfe.dev/cli/usage/configuration.html#configuration-file
TAPLO_CONFIG = "{{config_root}}/.config/taplo.toml"

[settings]
# read the node version from .nvmrc instead of pinning it here
idiomatic_version_file_enable_tools = ["node"]

[tools]
"aqua:rhysd/actionlint" = "1.7.12"
# GitHub Actions security auditor; complements actionlint's syntax checks
"aqua:zizmorcore/zizmor" = "1.26.1"
# Shell-script static analysis
"aqua:koalaman/shellcheck" = "0.11.0"
# mise-provided corepack: no npx per-invocation resolution, Node-25-proof
"npm:corepack" = "0.35.0"
# shadows node's bundled npm; OIDC trusted publishing needs npm >= 11.5.1
"npm:npm" = "12.0.1"
# TOML formatter; oxfmt handles everything but .toml, so this owns the mise
# configs and member mise.toml files. Pinned like the other aqua tools.
"aqua:tamasfe/taplo" = "0.10.0"

# Provisioning tasks, not hooks: hooks warn-and-continue, task failures are
# loud; and tool-only bumps (actionlint) skip the corepack ceremony.
# snake_case names (bazel target convention); no colons in task names — mise
# monorepo task addressing owns `:` (see the config_roots above).
[tasks.corepack_enable]
description = "Shim the corepack-managed package managers onto PATH"
run = "corepack enable"

[tasks.corepack_install]
# Materializes the packageManager pin (sha512-verified) in corepack's cache.
description = "Install the packageManager-pinned pnpm into the corepack cache"
run = "corepack install"

[tasks.corepack]
# Virtual grouping task; the two legs are order-independent and may run
# in parallel (enable writes shims, install populates COREPACK_HOME).
description = "Provision the packageManager-pinned pnpm via corepack"
depends = ["corepack_enable", "corepack_install"]

[tasks.setup]
# Bootstrap layer: the one step pnpm scripts can't own (no node_modules yet).
# Flow: mise trust && mise install && mise run setup.
# pnpm auto-enables --frozen-lockfile when CI is set (ci-info detection),
# so one task serves local (plain) and CI (frozen) alike.
description = "Install workspace dependencies with the pnpm on PATH"
depends = ["corepack"]
usage = '''
flag "--release" help="Scope the install to the @tools/release closure (tag-job)"
'''
run = 'pnpm install ${usage_release:+--filter @tools/release...}'

[tasks.setup.env]
CYPRESS_INSTALL_BINARY = "0"
# npm config for the examples/*
NPM_CONFIG_AUDIT = "false"
NPM_CONFIG_FUND = "false"

[tasks.lint_actionlint]
description = "Lint GitHub Actions workflows for syntax/type errors"
run = "actionlint"

[tasks.lint_zizmor]
# --offline: keep local and CI runs identical (online audits self-enable when a GH token is in env)
description = "Audit GitHub Actions workflows for security issues"
run = "zizmor --offline .github/workflows"

[tasks.lint_toml]
# `taplo lint` = TOML syntax/structure validation, offline by default (taplo only
# fetches schema catalogs with --default-schema-catalogs, which the task omits).
# Same tracked-file list as format_check_toml, so the format gate and the lint
# gate backstop each other's wiring. Schema-aware validation (invalid keys/types)
# stays opt-in: it needs a vendored schema + [[rule]] mapping to remain hermetic.
description = "Validate tracked TOML structure (mise configs, member mise.toml) with taplo"
run = "mise run taplo lint"

[tasks.lint_shellcheck]
# Thin alias; file selection + rationale live in the `shellcheck` file task
# (.config/mise/tasks/shellcheck)
description = "Static-analyze repo shell scripts (mise tasks, *.sh) with shellcheck"
run = "mise run shellcheck"

[tasks.lint_workflows]
# Virtual grouping task; the legs are independent and run in parallel. Covers
# CI/config-plumbing health: GH workflows (actionlint, zizmor) + TOML (taplo) + shell (shellcheck).
description = "Lint workflows and config plumbing (actionlint, zizmor, taplo, shellcheck)"
depends = ["lint_actionlint", "lint_zizmor", "lint_toml", "lint_shellcheck"]

# taplo owns .toml formatting (oxfmt covers everything else). The shared
# entrypoint (file selection + git ls-files default + <cmd> passthrough / --check
# flag) lives in the `taplo` file task (.config/mise/tasks/taplo); these are thin
# aliases so the pnpm/turbo task names stay stable.
[tasks.format_toml]
description = "Format tracked TOML files (mise configs, member mise.toml) with taplo"
run = "mise run taplo fmt"

[tasks.format_check_toml]
description = "Check tracked TOML formatting with taplo"
run = "mise run taplo fmt --check"

# ── Release pipeline ────────────────────────────────────────────────────────
# The release-workflow tasks live beside their code in
# tools/release/mise.toml, addressed as //tools/release:<step>
# (e.g. `mise run '//tools/release:pack'`). `mise tasks ls --all` lists them.
# Only the build step lives here (//:build): it's a repo-generic turbo
# invocation, not release logic, and at the root config_root turbo already
# runs from the workspace root.

[tasks.turbo_login]
# Writes to config.local.toml, which loads after this file and wins. Never
# check in a placeholder: an empty value here beats an ambient export and
# silently disables the remote cache.
description = "Store remote-cache credentials in .config/mise/config.local.toml (gitignored)"
# Two secrets, so each takes its own source rather than sharing stdin: a path
# (process substitution keeps both off argv and out of history), - for stdin,
# or nothing to be prompted. No env= fallbacks: mise exports both vars from the
# file this task writes, so an env-backed flag would read back the stored value
# and make rotation a silent no-op.
usage = '''
flag "--token-file <path>" help="Read the token from a file; - means stdin. Use <(op read ...) to keep it off argv"
flag "--signature-key-file <path>" help="Read the signature key from a file; - means stdin"
flag "--token <token>" help="Token literal (lands in shell history and ps; prefer --token-file)"
flag "--signature-key <key>" help="Signature key literal (same caveat)"
flag "--api <api>" help="Cache API endpoint" default="https://lit-ui-router-turborepo-remote-cache.shane-cf1.workers.dev"
flag "--team <team>" help="Team identifier" default="team_lit-ui-router"
flag "--local-writes" help="Let this machine push to the shared cache too (default: read-only remote; CI owns provenance)"
'''
run = '''
set -eu

token_file="${usage_token_file:-}"
key_file="${usage_signature_key_file:-}"
if [ "$token_file" = "-" ] && [ "$key_file" = "-" ]; then
  echo "turbo_login: only one field may read stdin; give the other a path, e.g. <(op read ...)" >&2
  exit 1
fi

# literal > file/stdin > prompt. Prompting delegates to read_secret, which
# refuses to print to a terminal, so the value only ever crosses a pipe.
resolve() { # $1=literal $2=source path $3=prompt label
  if [ -n "$1" ]; then
    printf '%s' "$1"
  elif [ "$2" = "-" ]; then
    IFS= read -r _v || true
    printf '%s' "$_v"
  elif [ -n "$2" ]; then
    [ -r "$2" ] || { echo "turbo_login: cannot read $2" >&2; exit 1; }
    IFS= read -r _v < "$2" || true
    printf '%s' "$_v"
  else
    mise run read_secret --label "$3"
  fi
}

token="$(resolve "${usage_token:-}" "$token_file" 'Remote-cache token')"
key="$(resolve "${usage_signature_key:-}" "$key_file" 'Remote-cache signature key')"
[ -n "$token" ] || { echo "turbo_login: no token supplied" >&2; exit 1; }
[ -n "$key" ] || { echo "turbo_login: no signature key supplied" >&2; exit 1; }

config="{{config_root}}/.config/mise/config.local.toml"
# mise set merges, preserving any other local overrides; it creates 0644, and
# these are plaintext secrets, so tighten before either one is written.
mise set --file "$config" TURBO_API="${usage_api}" TURBO_TEAM="${usage_team}"
chmod 600 "$config"
mise set --file "$config" TURBO_TOKEN="$token"
mise set --file "$config" TURBO_REMOTE_CACHE_SIGNATURE_KEY="$key"

# CI owns provenance: local reads the shared cache but never writes to it, so a
# laptop (softer than GitHub's secret store) cannot inject artifacts CI trusts.
# config.local.toml is gitignored, so this only ever scopes the local machine.
# Comma-separated; the CLI help's `remote:r;local:rw` semicolon is shell-only.
if [ -n "${usage_local_writes:-}" ]; then
  mise set --file "$config" TURBO_CACHE="remote:rw,local:rw"
else
  mise set --file "$config" TURBO_CACHE="remote:r,local:rw"
fi
'''

[tasks.read_secret]
description = "Prompt for a secret on the terminal and write it to stdout (pipe only)"
usage = '''
flag "--label <label>" help="Prompt text" default="Secret"
'''
run = '''
set -eu
# Refuse to put a secret in terminal scrollback: this task is only useful piped
# or captured. `mise run turbo_login` calls it through command substitution.
[ -t 1 ] && { echo "read_secret: refusing to print a secret to a terminal; pipe me" >&2; exit 1; }
exec 3<>/dev/tty || { echo "read_secret: no terminal to prompt on" >&2; exit 1; }
printf '%s: ' "${usage_label}" >&3
stty -echo <&3
trap 'stty echo <&3' EXIT INT TERM
IFS= read -r secret <&3
stty echo <&3
trap - EXIT INT TERM
printf '\n' >&3
exec 3<&-
printf '%s' "$secret"
'''

[tasks.build]
# env: TURBO_TOKEN/TURBO_API/TURBO_TEAM for remote cache (ambient turbo
# config, not a flag).
description = "Build one package and its workspace deps via turbo"
usage = '''
flag "--package-name <package_name>" help="Package to build (turbo <name>#build)" required=#true env="PACKAGE_NAME"
'''
run = 'turbo run "${usage_package_name?}#build"'

[tasks.ci]
# turbo's `ci` is the back-compat alias of `ci:pull_request`.
# env: TURBO_FORCE + TURBO_TOKEN/TURBO_API/TURBO_TEAM, which turbo reads from
# the env itself (no CLI flags), plus WRANGLER_LOG for the underlying
# tasks. TURBO_FORCE is the build-test deflake input: a truthy value
# forces a cache-bypassing rerun, ""/"false" respect the cache.
description = "Run the pull-request CI pipeline via turbo"
run = "turbo run ci --ui=stream --log-order=stream"

[tasks.ci_main]
# Superset of `ci` (same env contract): adds the main-only guard tasks
# (@tools/release#check:pack, @tools/dts-backtest#test:matrix) to the graph.
description = "Run the main-push CI pipeline via turbo"
run = "turbo run ci:main --ui=stream --log-order=stream"

[tasks.codecov_bundle]
# env: CODECOV_TOKEN plus the ambient TURBO_* remote-cache config.
description = "Upload bundle-analysis stats to Codecov via turbo"
run = "turbo run codecov:bundle --ui=stream --log-order=stream"

[tasks.dts_backtest_matrix]
# Ad-hoc alias for the full dts-backtest TS matrix; CI runs it via ci_main.
description = "Run the full dts-backtest TypeScript version matrix via turbo"
run = "turbo run test:matrix --ui=stream --log-order=stream"
