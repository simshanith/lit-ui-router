# Lints .github/workflows with the project-pinned actionlint (mise aqua backend).
# Standalone on purpose: kept out of build_and_test so edits to that workflow
# are themselves linted by a workflow the edit cannot break. build_and_test
# runs the same lint again via `turbo run ci` as a second net.
name: Lint workflows

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs per event per ref; never cancel main runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint_workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v7
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Lint workflows
        run: actionlint
