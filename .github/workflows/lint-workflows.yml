# Standalone workflow lint: actionlint (syntax/types) + zizmor (security audits)
name: Lint workflows

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs per event per ref; never cancel main runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint_workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Lint workflows
        run: actionlint
      - name: Audit workflows
        # --offline: keep local and CI runs identical (online audits self-enable when a GH token is in env)
        run: zizmor --offline .github/workflows
