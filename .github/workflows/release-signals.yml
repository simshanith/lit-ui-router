# Non-gating release signals on main's head, reported as per-package check
# runs: "published-diff (<pkg>)" (README badges read them via shields'
# check-runs endpoint) and "peer-floor (<pkg>)". action_required renders
# orange = a release/floor-bump is owed, never a CI failure — this job
# succeeds whether or not any signal is orange.
name: Release signals

on:
  push:
    branches:
      - main
  # Called by publish-npm.yml after a successful publish: release-it pushes
  # the bump commit before npm `latest` moves, so the push-triggered run sees
  # stale drift; the post-publish call flips the badge green. Calls always
  # run the full package set.
  workflow_call:
    secrets:
      TURBO_TOKEN:
        # Remote turbo cache; absent = local cache only.
        required: false
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated published package names to re-check (re-nudge tool: a scoped run creates check runs only for these, so on a head with no prior full run the other badges show nothing until the next push/full run). Empty = all.'
        required: false
        default: ''
        type: string

# Standard husky CI setup: skip the prepare-script git-hook install on CI installs.
env:
  HUSKY: 0

# One refresh at a time, newest wins; every run targets main's current head.
# Literal group: github.workflow evaluates to the CALLER's name on
# workflow_call, which would split called refreshes from push refreshes.
concurrency:
  group: release-signals
  cancel-in-progress: true

jobs:
  published_diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v7
        with:
          # Always main's head: workflow_call inherits the caller's context
          # (a tag ref from publish-npm), and the badges query main —
          # filter=latest supersedes stale same-name runs there.
          ref: main
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: mise run setup
      - name: Published diff
        run: mise run //tools/release:published_diff
        env:
          # Empty on push and workflow_call runs = full set.
          PUBLISHED_DIFF_PACKAGES: ${{ inputs.packages }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_API: ${{ vars.TURBO_API }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      - name: Publish check runs
        run: mise run //tools/release:publish_check_runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Tier-1 peer-floor signal: "peer-floor (<pkg>)" check runs, one per
      # package defining typecheck:peer-floor. action_required = the floor
      # pin is stale (release the peer, then bump the floor); never fails
      # this job. Reruns here flip green once the floor bump lands on main.
      - name: Peer floor check runs
        run: mise run //tools/release:peer_floor_check_runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_API: ${{ vars.TURBO_API }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
