# Automatic tagging workflow - called by build-test.yml after main's
# build_and_test job succeeds.
# Creates git tags for releases. The tags trigger nothing: publish-npm is
# workflow_call'ed by build-test.yml after this job (detect_release names the
# freshly tagged packages), so the push rides GITHUB_TOKEN — no PAT.
# Uses release-it with --no-increment to tag the current version without bumping.
#
# YAML here is triggers/permissions/secrets/environment/concurrency only; the
# pipeline logic lives in tools/release (mise tasks //tools/release:tag and
# :tag_push), inputs flow through step env — never `${{ }}` inside run
# lines.
name: Tag & push

on:
  # Called by build-test.yml's tag_push job (needs: build_and_test, main push
  # only): no tag unless the whole main CI run — build, tests, lint,
  # typecheck, check:pack — is green.
  workflow_call:
  # Manual dispatch bypasses the CI gate — hotfix escape hatch; the protected
  # tag-release environment still gates authorization. A dispatched tag
  # triggers no publish (tags trigger nothing now): follow up with the
  # publish escape hatch documented in publish-npm.yml.
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run: log the tag/push release-it would perform without creating it'
        required: false
        default: false
        type: boolean

# Standard husky CI setup: skip the prepare-script git-hook install on CI installs.
env:
  HUSKY: 0

jobs:
  publish_gh:
    runs-on: ubuntu-latest
    # Serialize per package across runs (call path and dispatch path share
    # these groups): a run that checks out before a sibling run pushes its tag
    # will re-create that tag, get its push rejected, and release-it's
    # rollback then deletes the tag from the remote.
    # The queue alone is not enough: release-it's own push sends main + tag
    # together, so a main push that lands mid-run rejects the whole push and
    # the rollback deletes the tag. Hence tagging (:tag, --git.push false) and
    # pushing (:tag_push, tag ref only) are separate tasks.
    # Job-level (not workflow-level): GitHub ignores workflow-level
    # concurrency in called workflows. Per-package groups: one shared group
    # would cancel the third matrix leg (max one running + one pending each).
    concurrency:
      group: tag-release-${{ matrix.package }}
    permissions:
      contents: write
    # Protected environment ensures only authorized pushes create tags
    environment: tag-release
    strategy:
      matrix:
        package:
          - lit-ui-router
          - lit-ui-router-mobx
          - ui-router-navigation-location-plugin
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Called runs inherit the caller's github.sha — the commit CI
          # validated; dispatch runs check out the main tip.
          fetch-depth: 0
          fetch-tags: true
          # GITHUB_TOKEN (job-scoped contents:write) persists on purpose: the
          # push in //tools/release:tag_push rides these credentials. The tag
          # need not trigger anything, so no PAT — GITHUB_TOKEN-created
          # events spawning no workflows is now a feature, not a bug.
          persist-credentials: true
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # task-env handling regressed before in unpinned mise; pin the version
          version: 2026.6.14
          # no restored tool cache (zizmor cache-poisoning): this job checks out
          # with persisted push credentials, so a poisoned cache would run
          # adjacent to them. Tools install fresh, checksum-verified against mise.lock.
          cache: false
      - name: Install dependencies
        run: mise run setup
      - name: Setup Git user
        run: mise run //tools/release:git_user
      - name: Tag
        run: mise run //tools/release:tag
        # continue-on-error: re-tagging an existing version fails here (release-it
        # errors, not a no-op); continue-on-error lets the run proceed anyway.
        continue-on-error: true
        env:
          PACKAGE: ${{ matrix.package }}
          # dryRun is declared for workflow_dispatch only; called runs get an
          # empty value and always tag for real
          DRY_RUN: ${{ inputs.dryRun }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push tag
        run: mise run //tools/release:tag_push
        # continue-on-error: a tag existing on the remote at a different commit is
        # rejected here, matching the previous tag-exists behavior
        continue-on-error: true
        env:
          PACKAGE: ${{ matrix.package }}
          DRY_RUN: ${{ inputs.dryRun }}
