# Manual workflow to create release PRs with version bumps.
# Triggered via GitHub Actions UI - select package, increment type, and run.
# Creates a release branch and PR that, when merged, triggers tagging.
#
# YAML here is triggers/permissions/secrets/environment only; the pipeline
# logic lives in tools/release (mise task //tools/release:bump), inputs flow through
# step env — never `${{ }}` inside run lines.
name: Bump version

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to bump'
        required: true
        type: choice
        options:
          - lit-ui-router
          - lit-ui-router-mobx
          - ui-router-navigation-location-plugin
        default: 'lit-ui-router'
      increment:
        description: 'Increment'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - other # Use with 'other' input for custom versions (e.g., prereleases)
          - none # No increment - use current version. No-op unless `other` provided
      other:
        description: 'Other increment'
        required: false
        type: string
      prBase:
        description: 'GitHub PR base branch'
        required: true
        default: 'main'
        type: string
      branchPrefix:
        description: 'GitHub PR branch prefix (default: release/{package}/v)'
        required: false
        type: string
      dryRun:
        description: 'Dry run: show the computed version/changelog, skip branch push and PR creation'
        required: false
        default: false
        type: boolean

# Load-bearing: the commit-msg hook rejects release-it's "Release X.Y.Z" commit by design.
env:
  HUSKY: 0

permissions:
  contents: write
# pull-requests: write # instead handled by GH_PERSONAL_ACCESS_TOKEN for downstream actions
# ^ Not using GITHUB_TOKEN for PR creation - PAT required so merging
# the PR triggers downstream workflows (tag-release, publish)

jobs:
  bump_version:
    runs-on: ubuntu-latest
    # Protected environment adds approval gate before version bumps
    environment: bump-version
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          # PAT (not GITHUB_TOKEN): release-it pushes the release branch over
          # these persisted credentials, and pushes/PRs from the default token
          # don't trigger downstream workflows. persist-credentials must stay on.
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # task-env handling regressed before in unpinned mise; pin the version
          version: 2026.6.14
          # no restored tool cache (zizmor cache-poisoning): this job checks out
          # with a persisted PAT, so a poisoned cache would run adjacent to live
          # push credentials. Tools install fresh, checksum-verified against mise.lock.
          cache: false
      - name: Install dependencies
        run: mise run setup
      - name: Setup Git user
        run: mise run //tools/release:git_user
      - name: Bump version
        # version calc, release branch, release-it commit+push, gh pr create —
        # see tools/release/src/steps/release-bump.ts for the phase-by-phase contract
        run: mise run //tools/release:bump
        env:
          PACKAGE: ${{ inputs.package }}
          INCREMENT: ${{ inputs.increment }}
          OTHER_INCREMENT: ${{ inputs.other }}
          PR_BASE: ${{ inputs.prBase }}
          BRANCH_PREFIX_INPUT: ${{ inputs.branchPrefix }}
          DRY_RUN: ${{ inputs.dryRun }}
          # PAT scoped to this step only: gh pr create must trigger workflows on merge
          GH_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
