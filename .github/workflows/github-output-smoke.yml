# TEMPORARY one-time smoke test (remove before merge): proves that a tool
# invoked via `mise run` can write to "$GITHUB_OUTPUT" and that the value is
# visible to later steps — the data-flow the collapsed release workflows rely
# on, which GitHub documents for plain run steps but not through a task
# runner. Runs the REAL release_package_info task in dispatch shape.
name: GITHUB_OUTPUT smoke

on:
  pull_request:
    paths:
      - '.github/workflows/github-output-smoke.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
      - name: Install dependencies
        run: mise run setup
      - name: Resolve package (writes GITHUB_OUTPUT from inside mise run)
        id: info
        run: mise run release_package_info
        env:
          PACKAGE_INPUT: lit-ui-router
      - name: Assert the outputs round-tripped
        run: test "$SMOKE_NAME" = "lit-ui-router" && test "$SMOKE_DIR" = "packages/lit-ui-router"
        env:
          SMOKE_NAME: ${{ steps.info.outputs.package_name }}
          SMOKE_DIR: ${{ steps.info.outputs.package_dir }}
