# NPM publish workflow - triggered by release tags.
# Uses OIDC trusted publishing (no NPM_TOKEN needed).
# See: https://docs.npmjs.com/trusted-publishers
# See: https://github.com/release-it/release-it/blob/19.2.2/docs/npm.md#trusted-publishing-oidc
name: Publish to NPM

on:
  push:
    tags:
      - 'lit-ui-router@*'
      - 'lit-ui-router-mobx@*'
      - 'ui-router-navigation-location-plugin@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (manual/dry-run testing only; real tag pushes derive this from the tag)'
        required: true
        type: choice
        options:
          - lit-ui-router
          - lit-ui-router-mobx
          - ui-router-navigation-location-plugin
      dryRun:
        description: 'Dry run: log the publish/release/attestation release-it would perform without doing it'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write      # Required for OIDC trusted publishing to NPM
  contents: write      # Required for creating GitHub releases
  attestations: write  # Required for build provenance attestation
  artifact-metadata: write

jobs:
  publish_npm:
    runs-on: ubuntu-latest
    # Protected environment adds approval gate before publishing
    environment: publish
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Extract package info from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE_NAME="${{ inputs.package }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            PACKAGE_NAME="${TAG%@*}"
          fi
          echo "$PACKAGE_NAME"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Update npm
        # npm >= 11.5.1 required for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Map npm name to directory
        run: |
          PACKAGE_DIR="$(realpath -s --relative-to="." "$(pnpm list --depth -1 --parseable --filter "$PACKAGE_NAME")")"
          echo "$PACKAGE_DIR"
          echo "PACKAGE_DIR=$PACKAGE_DIR" >> "$GITHUB_ENV"
      - name: Build
        run: npm exec -- turbo run ${{ env.PACKAGE_NAME }}#build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_API: ${{ vars.TURBO_API }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      - name: Pack
        # Create tarball for the GitHub release attachment AND the npm publish
        run: pnpm --filter ${{ env.PACKAGE_NAME }} pack --pack-destination ${{ env.PACKAGE_DIR }}
      - name: Verify packed manifest
        # pnpm pack substitutes catalog:/workspace: refs; fail if any leaked
        run: |
          TARBALL="$(realpath "$PACKAGE_DIR"/*.tgz)"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          if tar -xzOf "$TARBALL" package/package.json | grep -nE '"(catalog|workspace):'; then
            echo "::error::packed manifest contains unsubstituted catalog:/workspace: refs"
            exit 1
          fi
      - name: Attest build provenance
        # Generate SLSA provenance attestation for supply chain security.
        # Skipped on manual dry runs: this hits Sigstore/rekor for real and isn't part of release-it's --dry-run.
        if: ${{ !inputs.dryRun }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: '${{ env.PACKAGE_DIR }}/*.tgz'
      - name: Release version
        run: |
          echo "RELEASE_VERSION=$(pnpm --filter ${{ env.PACKAGE_NAME }} exec release-it --release-version --no-increment)" >> "$GITHUB_ENV"
      - name: Publish
        # release-it >= 20.1 handles immutable releases natively when assets
        # are configured: create draft, upload assets, publish — one
        # invocation, release id held in memory (no by-tag lookup, which
        # can't see drafts and used to create duplicate releases here).
        # --npm.skipChecks: Skip npm checks since we're using OIDC auth
        # --npm.publishPath: publish the pnpm-packed (and attested) tarball;
        # a bare `npm publish` re-packs from source and ships raw
        # catalog:/workspace: refs npm can't resolve (broke 1.3.0–1.5.0)
        # inputs.dryRun is only set for manual workflow_dispatch runs; real tag pushes always publish for real.
        run: pnpm --filter ${{ env.PACKAGE_NAME }} exec -- release-it --no-increment --npm.publish true --npm.skipChecks true --npm.publishPath "$TARBALL" --github.release true --github.assets "*.tgz" --git.tagExclude "\${npm.name}@$RELEASE_VERSION" ${{ inputs.dryRun && '--dry-run' || '' }}
