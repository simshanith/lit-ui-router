# NPM publish workflow - triggered by release tags.
# Uses OIDC trusted publishing (no NPM_TOKEN needed).
# See: https://docs.npmjs.com/trusted-publishers
# See: https://github.com/release-it/release-it/blob/19.2.2/docs/npm.md#trusted-publishing-oidc
#
# YAML here is triggers/permissions/secrets/environment only; the pipeline
# logic lives in tools/release (mise tasks), inputs flow through step env —
# never `${{ }}` inside run lines — and data flows between steps as
# GITHUB_OUTPUT step outputs the tools write.
name: Publish to NPM

on:
  push:
    tags:
      - 'lit-ui-router@*'
      - 'lit-ui-router-mobx@*'
      - 'ui-router-navigation-location-plugin@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (manual/dry-run testing only; real tag pushes derive this from the tag)'
        required: true
        type: choice
        options:
          - lit-ui-router
          - lit-ui-router-mobx
          - ui-router-navigation-location-plugin
      dryRun:
        description: 'Dry run: log the publish/release/attestation release-it would perform without doing it'
        required: false
        default: false
        type: boolean

# Standard husky CI setup: skip the prepare-script git-hook install on CI installs.
env:
  HUSKY: 0

jobs:
  publish_npm:
    runs-on: ubuntu-latest
    # Protected environment adds approval gate before publishing
    environment: publish
    permissions:
      id-token: write # Required for OIDC trusted publishing to NPM
      contents: write # Required for creating GitHub releases
      attestations: write # Required for build provenance attestation
      artifact-metadata: write
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          # Nothing in this job pushes: the packages' .release-it.json turns
          # git commit/tag/push off, so no credentials need to persist.
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # task-env handling regressed before in unpinned mise; pin the version
          version: 2026.6.14
          # no restored tool cache on the publish path (zizmor cache-poisoning):
          # tools install fresh, checksum-verified against mise.lock
          cache: false
      - name: Install dependencies
        run: mise run setup
      - name: Resolve package
        # tag → package name (hostile-refname safe) → workspace directory
        id: info
        run: mise run //tools/release:package_info
        env:
          PACKAGE_INPUT: ${{ inputs.package }}
      - name: Build
        run: mise run //:build
        env:
          PACKAGE_NAME: ${{ steps.info.outputs.package_name }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
          TURBO_API: ${{ secrets.TURBO_API }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      - name: Pack
        # strip devDependencies/scripts → pnpm pack → restore (try/finally);
        # the tarball feeds the attestation, the manifest gate, and the publish
        id: pack
        run: mise run //tools/release:pack
        env:
          PACKAGE_NAME: ${{ steps.info.outputs.package_name }}
          PACKAGE_DIR: ${{ steps.info.outputs.package_dir }}
      - name: Check packed manifest
        # no devDependencies, no scripts, and no unsubstituted catalog:/workspace: refs may ship
        run: mise run //tools/release:check_tarball
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
      - name: Attest build provenance
        # Generate SLSA provenance attestation for supply chain security.
        # Skipped on manual dry runs: this hits Sigstore/rekor for real and isn't part of release-it's --dry-run.
        if: ${{ !inputs.dryRun }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
      - name: Publish
        # release-it publishes the attested tarball and cuts the GitHub
        # release in one invocation; the argv (and the #302 changelog-range
        # pin) is built by the engine seam — see tools/release/src/steps/release-publish.ts
        run: mise run //tools/release:publish
        env:
          PACKAGE_NAME: ${{ steps.info.outputs.package_name }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          # only set on manual workflow_dispatch runs; real tag pushes always publish for real
          DRY_RUN: ${{ inputs.dryRun }}
          # scoped here: only release-it's GitHub release needs it (npm auth is OIDC)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  published_diff:
    # Refresh the per-package published-diff check runs now that `latest` has
    # moved; deliberately unscoped — a full run avoids badge gaps on the fresh
    # bump-commit head. A failure here should be visible; workflow_dispatch on
    # Published Diff is the re-nudge.
    needs: publish_npm
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/release-signals.yml
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
      TURBO_API: ${{ secrets.TURBO_API }}
