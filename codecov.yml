# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto

# Bundle stats (apps' vite builds, ui-router-server entries, the docs worker).
# Informational while the new series baseline; the intent is to flip status to
# true (and require the check) once a few main commits establish the baseline.
bundle_analysis:
  warning_threshold: '5%'
  status: 'informational'

# Component definitions for monorepo packages
# https://docs.codecov.com/docs/components
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: lit-ui-router
      name: lit-ui-router
      paths:
        - packages/lit-ui-router/src/**
    - component_id: navigation-location-plugin
      name: navigation-location-plugin
      paths:
        - packages/navigation-location-plugin/src/**
    - component_id: lit-ui-router-mobx
      name: lit-ui-router-mobx
      paths:
        - packages/lit-ui-router-mobx/src/**
