packages:
  - apps/*
  - packages/*
  - tools/*
  - docs
  - examples

catalog:
  '@ampproject/remapping': ^2.3.0
  '@api-viewer/docs': 1.0.0-pre.10
  '@codecov/bundle-analyzer': ^2.0.1
  '@oxc-project/runtime': 0.140.0
  '@commitlint/cli': ^21.2.0
  '@commitlint/config-conventional': ^21.2.0
  '@commitlint/types': ^21.2.0
  '@custom-elements-manifest/analyzer': ^0.11.0
  '@pnpm/types': 1101.4.0
  '@pnpm/workspace.project-manifest-reader': 1100.0.15
  '@pnpm/workspace.projects-reader': 1101.0.14
  '@pnpm/workspace.workspace-manifest-reader': 1100.1.0
  '@release-it/conventional-changelog': ^11.0.1
  '@spectrum-web-components/icons-workflow': ^1.12.2
  '@types/dom-navigation': ^1.0.7
  '@types/lodash': ^4.17.24
  '@types/node': ^24.13.3
  '@types/pacote': ^11.1.8
  '@uirouter/core': ^6.1.2
  '@uirouter/dsr': ^1.2.0
  '@uirouter/sticky-states': ^1.5.1
  '@uirouter/visualizer': ^7.2.1
  '@vitest/browser-playwright': ^4.1.10
  '@vitest/coverage-v8': ^4.1.10
  concurrently: ^10.0.3
  cypress: ^15.18.1
  diff: ^9.0.0
  esbuild: ^0.28.1
  eslint: ^10.7.0
  eslint-formatter-tap: ^9.0.1
  eslint-plugin-oxlint: ^1.73.0
  eslint-plugin-package-json: ^1.6.0
  eslint-plugin-pnpm: ^1.6.1
  eslint-plugin-turbo: ^2.10.5
  happy-dom: ^20.11.0
  hono: ^4.12.31
  husky: ^9.1.7
  jsonc-parser: ^3.3.1
  lit: ^3.3.3
  lit-dialog: ^2.0.1
  lodash: ^4.18.1
  mobx: ^6.16.1
  oxc-minify: 0.140.0
  oxc-transform: 0.140.0
  oxfmt: 0.59.0
  oxlint: 1.74.0
  oxlint-tsgolint: 0.25.0
  pacote: ^22.0.0
  playwright: ^1.61.1
  release-it: ^20.2.1
  rimraf: ^6.1.3
  rolldown: ^1.2.0
  screenfull: ^6.0.2
  start-server-and-test: ^3.0.11
  turbo: ^2.10.5
  typedoc: ^0.28.20
  typedoc-plugin-markdown: ^4.12.0
  typedoc-vitepress-theme: ^1.1.3
  typescript: ^7.0.2
  typescript-5.0: npm:typescript@5.0.4
  typescript-5.9: npm:typescript@^5.9.3
  typescript-7: npm:typescript@^7.0.2
  vite: ^8.1.3
  vite-plugin-checker: ^0.14.4
  vite-plugin-static-copy: ^4.1.1
  vitepress: ^2.0.0-alpha.18
  vitest: ^4.1.10
  vue: ^3.5.40
  vue-tsc: ^3.3.7
  wrangler: ^4.112.0

catalogMode: prefer

catalogs:
  # exact published floor of the matching publishedPeer range; peer-floor-guard
  # fails the typecheck:peer-floor task when the two drift apart
  peerFloor:
    lit-ui-router-floor: npm:lit-ui-router@1.7.0
  publishedPeer:
    '@uirouter/core': ^6.0.8
    hono: ^4.0.0
    lit: ^3.0.0
    lit-ui-router: ^1.7.0
    mobx: ^6.0.0
    typedoc: ^0.28.0
  typescript6-compat:
    typescript: npm:@typescript/typescript6@^6.0.2
  typescript6:
    typescript: ^6.0.3
    typescript-6: npm:typescript@^6.0.3

allowBuilds:
  cypress: true
  esbuild: true
  playwright: true
  rs-module-lexer: true
  sharp: true
  workerd: true

overrides:
  d3-color: 3.1.0
  dompurify: 3.4.12
  fast-uri: 3.1.4
  sharp: 0.35.0
  shell-quote: 1.9.0
  'undici@6': 6.27.0
  'undici@7': 7.28.0

packageExtensions:
  conventional-changelog-preset-loader:
    dependencies:
      conventional-changelog-conventionalcommits: ^9.3.1

verifyDepsBeforeRun: false

# Link a workspace package whenever a plain range matches its version, not only
# explicit `workspace:*`. First layer of the @tools npm-block (see .npmrc).
linkWorkspacePackages: true

patchedDependencies:
  '@api-viewer/docs': patches/@api-viewer__docs.patch
  '@vitest/browser': patches/@vitest__browser.patch
  lit-dialog: patches/lit-dialog.patch

minimumReleaseAgeStrict: true
