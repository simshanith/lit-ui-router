  typescript6:
    typescript: ^6.0.3
    typescript-6: npm:typescript@^6.0.3
  vitepress1:
    vite-plugin-static-copy: ^3.4.0

allowBuilds:
  cypress: true
  esbuild: true
  playwright: true
  rs-module-lexer: true
  sharp: true
  workerd: true

overrides:
  d3-color: 3.1.0
  dompurify: 3.4.11
